<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a2560"/>
      <stop offset="100%" stop-color="#151238"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#a5b4fc" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#a5b4fc" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1.4" fill="#ffffff" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="800" height="340" fill="url(#bg)"/>
  <rect width="800" height="340" fill="url(#grid)"/>
  <rect width="800" height="340" fill="url(#glow)"/>

  <!-- pipeline nodes -->
  <g stroke="#c7d2fe" stroke-width="4" fill="#231f52">
    <rect x="70" y="130" width="100" height="80" rx="12"/>
    <rect x="255" y="130" width="100" height="80" rx="12"/>
    <rect x="440" y="130" width="100" height="80" rx="12"/>
    <rect x="625" y="130" width="105" height="80" rx="12"/>
  </g>

  <!-- source cylinder -->
  <g transform="translate(120,170)" stroke="#c7d2fe" stroke-width="4" fill="#2a2560">
    <ellipse cx="0" cy="-18" rx="22" ry="9"/>
    <path d="M-22,-18 v28 a22,9 0 0 0 44,0 v-28"/>
  </g>

  <!-- data factory gear -->
  <g transform="translate(305,170)" stroke="#c7d2fe" stroke-width="4" fill="none">
    <circle r="24"/>
    <circle r="8" fill="#c7d2fe"/>
    <g stroke-linecap="round">
      <line x1="0" y1="-30" x2="0" y2="-24"/>
      <line x1="0" y1="30" x2="0" y2="24"/>
      <line x1="-30" y1="0" x2="-24" y2="0"/>
      <line x1="30" y1="0" x2="24" y2="0"/>
      <line x1="21" y1="-21" x2="17" y2="-17"/>
      <line x1="-21" y1="-21" x2="-17" y2="-17"/>
      <line x1="21" y1="21" x2="17" y2="17"/>
      <line x1="-21" y1="21" x2="-17" y2="17"/>
    </g>
  </g>

  <!-- data lake -->
  <g transform="translate(490,175)" stroke="#c7d2fe" stroke-width="4" fill="#2a2560">
    <path d="M-26,-22 L0,-30 L26,-22 L26,10 L0,20 L-26,10 Z"/>
    <path d="M-26,-2 Q0,10 26,-2" fill="none" stroke-opacity="0.7"/>
  </g>

  <!-- power bi bars -->
  <g transform="translate(660,190)" fill="#c7d2fe">
    <rect x="-24" y="-10" width="10" height="10"/>
    <rect x="-8" y="-24" width="10" height="24"/>
    <rect x="8" y="-34" width="10" height="34"/>
  </g>

  <!-- connecting arrows -->
  <g stroke="#a5b4fc" stroke-width="5" stroke-linecap="round">
    <line x1="170" y1="170" x2="248" y2="170"/>
    <polyline points="232,155 248,170 232,185" fill="none" stroke-linejoin="round"/>
    <line x1="355" y1="170" x2="433" y2="170"/>
    <polyline points="417,155 433,170 417,185" fill="none" stroke-linejoin="round"/>
    <line x1="540" y1="170" x2="618" y2="170"/>
    <polyline points="602,155 618,170 602,185" fill="none" stroke-linejoin="round"/>
  </g>
</svg>
