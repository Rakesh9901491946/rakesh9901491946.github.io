<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#123b57"/>
      <stop offset="100%" stop-color="#081c2c"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#67e8f9" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#67e8f9" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1.4" fill="#ffffff" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="800" height="340" fill="url(#bg)"/>
  <rect width="800" height="340" fill="url(#grid)"/>
  <rect width="800" height="340" fill="url(#glow)"/>

  <!-- document -->
  <rect x="290" y="60" width="230" height="220" rx="10" fill="#0e2f45" stroke="#8ef4ff" stroke-width="5"/>
  <g stroke="#8ef4ff" stroke-width="6" stroke-linecap="round" opacity="0.85">
    <line x1="315" y1="100" x2="450" y2="100"/>
    <line x1="315" y1="130" x2="490" y2="130"/>
    <line x1="315" y1="160" x2="470" y2="160"/>
    <line x1="315" y1="190" x2="440" y2="190"/>
    <line x1="315" y1="220" x2="480" y2="220"/>
  </g>
  <rect x="308" y="120" width="185" height="24" fill="#67e8f9" fill-opacity="0.28"/>
  <rect x="308" y="150" width="165" height="24" fill="#67e8f9" fill-opacity="0.2"/>

  <!-- scan line -->
  <line x1="270" y1="80" x2="270" y2="260" stroke="#f87171" stroke-width="4" opacity="0.8"/>

  <!-- magnifier -->
  <g transform="translate(560,225)" stroke="#8ef4ff" stroke-width="7" fill="none" stroke-linecap="round">
    <circle r="42" fill="#8ef4ff" fill-opacity="0.12"/>
    <line x1="30" y1="30" x2="62" y2="62"/>
  </g>
</svg>
