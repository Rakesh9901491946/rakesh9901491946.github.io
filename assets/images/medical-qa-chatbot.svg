<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c4433"/>
      <stop offset="100%" stop-color="#06201a"/>
    </linearGradient>
    <radialGradient id="glow" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1.4" fill="#ffffff" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="800" height="340" fill="url(#bg)"/>
  <rect width="800" height="340" fill="url(#grid)"/>
  <rect width="800" height="340" fill="url(#glow)"/>

  <!-- medical badge with heartbeat pulse -->
  <g transform="translate(170,170)">
    <circle r="80" fill="#0a2e22" stroke="#8effc9" stroke-width="6"/>
    <rect x="-14" y="-40" width="28" height="80" rx="6" fill="#8effc9" fill-opacity="0.9"/>
    <rect x="-40" y="-14" width="80" height="28" rx="6" fill="#8effc9" fill-opacity="0.9"/>
    <polyline points="-95,10 -55,10 -40,-25 -20,40 0,-15 15,10 95,10"
      fill="none" stroke="#34d399" stroke-width="4" opacity="0.7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- MedQuAD knowledge doc -->
  <g transform="translate(400,170)" stroke="#8effc9" stroke-width="4">
    <rect x="-42" y="-58" width="84" height="116" rx="8" fill="#0d3a2c"/>
    <line x1="-24" y1="-30" x2="24" y2="-30" opacity="0.85"/>
    <line x1="-24" y1="-8" x2="24" y2="-8" opacity="0.85"/>
    <line x1="-24" y1="14" x2="10" y2="14" opacity="0.85"/>
  </g>
  <g transform="translate(430,205)" stroke="#8effc9" stroke-width="7" fill="none" stroke-linecap="round">
    <circle r="26" fill="#8effc9" fill-opacity="0.12"/>
    <line x1="18" y1="18" x2="38" y2="38"/>
  </g>

  <!-- arrows -->
  <g stroke="#8effc9" stroke-width="5" stroke-linecap="round">
    <line x1="255" y1="170" x2="330" y2="170"/>
    <polyline points="312,152 330,170 312,188" fill="none" stroke-linejoin="round"/>
    <line x1="480" y1="170" x2="560" y2="170"/>
    <polyline points="542,152 560,170 542,188" fill="none" stroke-linejoin="round"/>
  </g>

  <!-- chat bubble with grounded answer -->
  <path d="M590,105 h140 a14,14 0 0 1 14,14 v90 a14,14 0 0 1 -14,14 h-100 l-27,28 v-28 h-13 a14,14 0 0 1 -14,-14 v-90 a14,14 0 0 1 14,-14 Z"
    fill="#0d3a2c" stroke="#8effc9" stroke-width="4"/>
  <g stroke="#8effc9" stroke-width="5" stroke-linecap="round" opacity="0.85">
    <line x1="612" y1="140" x2="710" y2="140"/>
    <line x1="612" y1="165" x2="695" y2="165"/>
    <line x1="612" y1="190" x2="705" y2="190"/>
  </g>
</svg>
