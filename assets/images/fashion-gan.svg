<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#123b57"/>
      <stop offset="100%" stop-color="#081c2c"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#67e8f9" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#67e8f9" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1.4" fill="#ffffff" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="800" height="340" fill="url(#bg)"/>
  <rect width="800" height="340" fill="url(#grid)"/>
  <rect width="800" height="340" fill="url(#glow)"/>

  <!-- noise box -->
  <rect x="90" y="110" width="170" height="120" rx="10" fill="none" stroke="#8ef4ff" stroke-width="3" stroke-dasharray="6 8" opacity="0.7"/>
  <g fill="#8ef4ff">
    <circle cx="120" cy="140" r="4" opacity="0.8"/>
    <circle cx="150" cy="160" r="3" opacity="0.6"/>
    <circle cx="180" cy="135" r="5" opacity="0.7"/>
    <circle cx="210" cy="170" r="3" opacity="0.5"/>
    <circle cx="135" cy="190" r="4" opacity="0.65"/>
    <circle cx="230" cy="145" r="4" opacity="0.6"/>
    <circle cx="170" cy="205" r="3" opacity="0.55"/>
    <circle cx="200" cy="210" r="5" opacity="0.7"/>
  </g>

  <!-- arrow -->
  <g stroke="#67e8f9" stroke-width="6" stroke-linecap="round">
    <line x1="290" y1="170" x2="380" y2="170"/>
    <polyline points="360,150 380,170 360,190" fill="none" stroke-linejoin="round"/>
  </g>

  <!-- generated garments -->
  <g stroke="#8ef4ff" stroke-width="5" fill="#8ef4ff" fill-opacity="0.12" stroke-linejoin="round">
    <path d="M470,110 L500,95 L530,110 L522,140 L540,240 L460,240 L478,140 Z"/>
    <path d="M600,100 L660,100 L672,130 L650,140 L650,230 L610,230 L610,140 L588,130 Z"/>
  </g>
</svg>
