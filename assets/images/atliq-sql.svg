<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a3007"/>
      <stop offset="100%" stop-color="#241705"/>
    </linearGradient>
    <radialGradient id="glow" cx="60%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1.4" fill="#ffffff" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="800" height="340" fill="url(#bg)"/>
  <rect width="800" height="340" fill="url(#grid)"/>
  <rect width="800" height="340" fill="url(#glow)"/>

  <!-- database cylinder -->
  <g transform="translate(150,170)" stroke="#ffe6a3" stroke-width="5" fill="#3d2707">
    <ellipse cx="0" cy="-70" rx="60" ry="20"/>
    <path d="M-60,-70 V70 a60,20 0 0 0 120,0 V-70"/>
    <path d="M-60,-25 a60,20 0 0 0 120,0" fill="none" stroke-opacity="0.6"/>
    <path d="M-60,20 a60,20 0 0 0 120,0" fill="none" stroke-opacity="0.6"/>
  </g>

  <!-- arrow -->
  <g stroke="#fbbf24" stroke-width="5" stroke-linecap="round">
    <line x1="245" y1="170" x2="320" y2="170"/>
    <polyline points="302,152 320,170 302,188" fill="none" stroke-linejoin="round"/>
  </g>

  <!-- query lines -->
  <g fill="#3d2707" stroke="#ffe6a3" stroke-width="3">
    <rect x="345" y="95" width="330" height="130" rx="10"/>
  </g>
  <g stroke="#fde68a" stroke-width="6" stroke-linecap="round" opacity="0.9">
    <line x1="368" y1="125" x2="460" y2="125"/>
    <line x1="368" y1="150" x2="500" y2="150"/>
    <line x1="368" y1="175" x2="440" y2="175"/>
    <line x1="368" y1="200" x2="480" y2="200"/>
  </g>

  <!-- result bars -->
  <g fill="#fbbf24" transform="translate(560,0)">
    <rect x="0" y="170" width="16" height="35"/>
    <rect x="24" y="150" width="16" height="55"/>
    <rect x="48" y="185" width="16" height="20"/>
    <rect x="72" y="140" width="16" height="65"/>
  </g>
</svg>
