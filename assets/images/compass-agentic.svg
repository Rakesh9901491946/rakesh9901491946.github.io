<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c4433"/>
      <stop offset="100%" stop-color="#06201a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1.4" fill="#ffffff" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="800" height="340" fill="url(#bg)"/>
  <rect width="800" height="340" fill="url(#grid)"/>
  <rect width="800" height="340" fill="url(#glow)"/>

  <!-- agent nodes connected to hub -->
  <g stroke="#8effc9" stroke-width="3" opacity="0.7">
    <line x1="400" y1="170" x2="190" y2="90"/>
    <line x1="400" y1="170" x2="620" y2="90"/>
    <line x1="400" y1="170" x2="170" y2="230"/>
    <line x1="400" y1="170" x2="630" y2="245"/>
    <line x1="400" y1="170" x2="400" y2="55"/>
  </g>
  <g fill="#0d3a2c" stroke="#8effc9" stroke-width="4">
    <circle cx="190" cy="90" r="26"/>
    <circle cx="620" cy="90" r="26"/>
    <circle cx="170" cy="230" r="26"/>
    <circle cx="630" cy="245" r="26"/>
    <circle cx="400" cy="55" r="22"/>
  </g>

  <!-- compass hub -->
  <g transform="translate(400,170)">
    <circle r="70" fill="#0a2e22" stroke="#8effc9" stroke-width="6"/>
    <circle r="70" fill="none" stroke="#34d399" stroke-width="2" opacity="0.5"/>
    <g stroke="#8effc9" stroke-width="3" opacity="0.8">
      <line x1="0" y1="-70" x2="0" y2="-58"/>
      <line x1="0" y1="70" x2="0" y2="58"/>
      <line x1="-70" y1="0" x2="-58" y2="0"/>
      <line x1="70" y1="0" x2="58" y2="0"/>
    </g>
    <path d="M0,-40 L14,10 L0,40 L-14,10 Z" fill="#34d399" fill-opacity="0.85" transform="rotate(25)"/>
  </g>
</svg>
