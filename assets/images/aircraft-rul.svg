<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#123b57"/>
      <stop offset="100%" stop-color="#081c2c"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#67e8f9" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#67e8f9" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1.4" fill="#ffffff" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="800" height="340" fill="url(#bg)"/>
  <rect width="800" height="340" fill="url(#grid)"/>
  <rect width="800" height="340" fill="url(#glow)"/>

  <!-- turbine -->
  <g transform="translate(150,175)" stroke="#8ef4ff" stroke-width="6" fill="none" stroke-linecap="round">
    <circle r="46" fill="#0e2f45" stroke-opacity="0.9"/>
    <circle r="14" fill="#8ef4ff" fill-opacity="0.25"/>
    <line x1="0" y1="-46" x2="0" y2="-78" stroke-opacity="0.85"/>
    <line x1="0" y1="46" x2="0" y2="78" stroke-opacity="0.85"/>
    <line x1="-46" y1="0" x2="-78" y2="0" stroke-opacity="0.85"/>
    <line x1="33" y1="-33" x2="55" y2="-55" stroke-opacity="0.85"/>
    <line x1="-33" y1="-33" x2="-55" y2="-55" stroke-opacity="0.85"/>
    <line x1="33" y1="33" x2="55" y2="55" stroke-opacity="0.85"/>
  </g>

  <!-- degradation time-series -->
  <g stroke="#8ef4ff" stroke-width="3" opacity="0.55">
    <line x1="330" y1="255" x2="680" y2="255"/>
    <line x1="330" y1="255" x2="330" y2="90"/>
  </g>
  <line x1="330" y1="185" x2="680" y2="185" stroke="#fca5a5" stroke-width="3" stroke-dasharray="8 8" opacity="0.8"/>
  <polyline points="330,120 380,128 430,140 470,152 510,168 545,178 580,200 610,215 640,232 665,244"
    fill="none" stroke="#67e8f9" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="665" cy="244" r="10" fill="#f87171"/>
</svg>
